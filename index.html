                textTransform: "uppercase",
              }}
            >
              Save PDF
            </button>
            <button
              onClick={() => window.print()}
              style={{
                background: "transparent",
                color: "#fff",
                border: "1px solid rgba(255,255,255,0.4)",
                borderRadius: 6,
                padding: "8px 12px",
                fontSize: 13,
                fontWeight: 700,
              }}
            >
              Print
            </button>
          </div>
        }
      />
      <div
        id="cmp-dossier-page"
        className="print-page"
        style={{
          maxWidth: 740,
          margin: "20px auto",
          background: "#fff",
          boxShadow: "0 8px 30px rgba(0,0,0,0.15)",
        }}
      >
        {/* Cover plate */}
        <div
          style={{
            background: C.ink,
            color: "#fff",
            padding: "34px 30px",
            borderBottom: "4px solid " + C.brass,
          }}
        >
          <div
            style={{
              fontFamily: "ui-monospace, Menlo, monospace",
              fontSize: 11,
              letterSpacing: "0.2em",
              opacity: 0.8,
              textTransform: "uppercase",
            }}
          >
            Documented Vessel History
          </div>
          <div
            style={{
              fontWeight: 900,
              fontSize: 30,
              marginTop: 8,
              letterSpacing: "-0.01em",
            }}
          >
            {vessel.name}
          </div>
          <div style={{ fontSize: 14, opacity: 0.85, marginTop: 4 }}>
            {[vessel.make, vessel.location].filter(Boolean).join(" · ")}
          </div>
          {vessel.hin && (
            <div
              style={{
                fontFamily: "ui-monospace, Menlo, monospace",
                fontSize: 12,
                opacity: 0.8,
                marginTop: 6,
                letterSpacing: "0.08em",
              }}
            >
              HIN {vessel.hin}
            </div>
          )}
          {((vessel.engines || []).some((e) => e.serial) || vessel.genSerial) && (
            <div
              style={{
                fontFamily: "ui-monospace, Menlo, monospace",
                fontSize: 11,
                opacity: 0.7,
                marginTop: 6,
                lineHeight: 1.6,
              }}
            >
              {(vessel.engines || [])
                .filter((e) => e.serial)
                .map((e, i) => (
                  <div key={e.id}>
                    {(e.label || "Engine " + (i + 1)) + " S/N: " + e.serial}
                  </div>
                ))}
              {vessel.genSerial && <div>Generator S/N: {vessel.genSerial}</div>}
            </div>
          )}
          <div style={{ display: "flex", gap: 26, marginTop: 22, flexWrap: "wrap" }}>
            {[
              ["Reports on file", reports.length],
              [
                "Coverage",
                dateLabel(first.dateISO) + " – " + dateLabel(last.dateISO),
              ],
              ...(hoursSeries.length
                ? [
                    [
                      "Engine hours",
                      hoursSeries[0].h +
                        " → " +
                        hoursSeries[hoursSeries.length - 1].h,
                    ],
                  ]
                : []),
              ["Documented repairs", allWork.length],
            ].map(([k, v]) => (
              <div key={k}>
                <div
                  style={{
                    fontFamily: "ui-monospace, Menlo, monospace",
                    fontSize: 10,
                    letterSpacing: "0.14em",
                    opacity: 0.7,
                    textTransform: "uppercase",
                  }}
                >
                  {k}
                </div>
                <div style={{ fontWeight: 800, fontSize: 17, marginTop: 2 }}>
                  {v}
                </div>
              </div>
            ))}
          </div>
        </div>

        <div style={{ padding: "26px 30px" }}>
          {/* Attestation */}
          <div
            style={{
              border: "2px solid " + C.ink,
              borderRadius: 8,
              padding: "18px 20px",
              marginBottom: 24,
            }}
          >
            <div
              style={{
                fontFamily: "ui-monospace, Menlo, monospace",
                fontSize: 10,
                letterSpacing: "0.14em",
                color: C.brassDark,
                textTransform: "uppercase",
                marginBottom: 8,
              }}
            >
              Statement of documented service
            </div>
            <div style={{ fontSize: 13.5, lineHeight: 1.7, color: C.inkSoft }}>
              This document represents the service and maintenance history on
              record for {vessel.name}
              {vessel.hin ? " (HIN " + vessel.hin + ")" : ""} as serviced and
              coordinated by Coastal Marine Pro between{" "}
              {dateLabel(first.dateISO)} and {dateLabel(last.dateISO)}. It
              comprises {reports.length}{" "}
              {reports.length === 1 ? "report" : "reports"} and{" "}
              {allWork.length} documented service{" "}
              {allWork.length === 1 ? "item" : "items"} across the vessel's
              systems, presented in chronological order. Records are maintained
              as the work is performed to support the vessel's condition,
              reliability, and resale value.
            </div>
            <div
              style={{
                marginTop: 14,
                paddingTop: 12,
                borderTop: "1px solid " + C.line,
                fontSize: 13,
              }}
            >
              <div style={{ fontWeight: 800 }}>Cory — Coastal Marine Pro</div>
              <div style={{ color: C.mute }}>
                Mobile marine service · Bradenton / Sarasota / St. Pete
              </div>
            </div>
          </div>

          {/* Timeline */}
          <ReportBlock title="Service timeline">
            <div style={{ overflowX: "auto" }}>
              <table
                style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}
              >
                <thead>
                  <tr
                    style={{
                      textAlign: "left",
                      fontFamily: "ui-monospace, Menlo, monospace",
                      fontSize: 10,
                      letterSpacing: "0.1em",
                      color: C.mute,
                      textTransform: "uppercase",
                    }}
                  >
                    <th style={{ padding: "6px 8px 6px 0" }}>Visit</th>
                    <th style={{ padding: "6px 8px" }}>Date</th>
                    <th style={{ padding: "6px 8px" }}>Type</th>
                    <th style={{ padding: "6px 8px" }}>Hours</th>
                    <th style={{ padding: "6px 8px" }}>Entries</th>
                    <th style={{ padding: "6px 0 6px 8px" }}>Status</th>
                  </tr>
                </thead>
                <tbody>
                  {reports.map((r) => {
                    const tmm = TYPE_META[r.type || "monthly"];
                    const st = verdictOf(r);
                    const badge = tmm.badge
                      ? [tmm.badge, tmm.color]
                      : VERDICT[st.v];
                    return (
                      <tr key={r.id} style={{ borderTop: "1px solid " + C.line }}>
                        <td style={{ padding: "8px 8px 8px 0", fontWeight: 700 }}>
                          {reportName(r)}
                        </td>
                        <td style={{ padding: "8px" }}>{dateLabel(r.dateISO)}</td>
                        <td style={{ padding: "8px" }}>{tmm.label}</td>
                        <td
                          style={{
                            padding: "8px",
                            fontFamily: "ui-monospace, Menlo, monospace",
                          }}
                        >
                          {r.engineHours || "—"}
                        </td>
                        <td style={{ padding: "8px" }}>
                          {(r.workLog || []).filter((w) => w.title.trim()).length}
                        </td>
                        <td style={{ padding: "8px 0 8px 8px" }}>
                          <span
                            style={{
                              fontFamily: "ui-monospace, Menlo, monospace",
                              fontSize: 11,
                              fontWeight: 700,
                              color: badge[1],
                            }}
                          >
                            {badge[0]}
                          </span>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </ReportBlock>

          {/* Detailed service records: each visit as a formal dated record */}
          <ReportBlock title="Detailed service records">
            <div style={{ fontSize: 12.5, color: C.mute, marginBottom: 14 }}>
              Each documented visit in full, in chronological order. Hours shown
              are as recorded at the time of service.
            </div>
            {reports.map((r) => {
              const work = (r.workLog || []).filter((w) => w.title.trim());
              const finds = [];
              (r.sections || []).forEach((s) =>
                s.items.forEach((it) => {
                  if (it.status === "action" || it.status === "monitor")
                    finds.push({ ...it, section: s.name });
                })
              );
              const tmm = TYPE_META[r.type || "monthly"];
              return (
                <div
                  key={r.id}
                  className="report-item"
                  style={{
                    border: "1px solid " + C.line,
                    borderRadius: 8,
                    padding: "14px 16px",
                    marginBottom: 16,
                  }}
                >
                  <div
                    style={{
                      display: "flex",
                      justifyContent: "space-between",
                      alignItems: "flex-start",
                      gap: 10,
                      flexWrap: "wrap",
                      borderBottom: "2px solid " + C.ink,
                      paddingBottom: 8,
                      marginBottom: 10,
                    }}
                  >
                    <div>
                      <div style={{ fontWeight: 900, fontSize: 15 }}>
                        {reportName(r)}
                      </div>
                      <div style={{ fontSize: 12, color: C.mute, marginTop: 2 }}>
                        {dateLabel(r.dateISO)}
                        {r.engineHours ? " \u00b7 Engine hrs: " + r.engineHours : ""}
                        {r.generatorHours
                          ? " \u00b7 Gen hrs: " + r.generatorHours
                          : ""}
                      </div>
                    </div>
                    <div
                      style={{
                        fontFamily: "ui-monospace, Menlo, monospace",
                        fontSize: 10,
                        fontWeight: 700,
                        letterSpacing: "0.1em",
                        color: tmm.color,
                        border: "1.5px solid " + tmm.color,
                        borderRadius: 5,
                        padding: "3px 8px",
                        textTransform: "uppercase",
                      }}
                    >
                      {tmm.label}
                    </div>
                  </div>

                  {r.type === "diagnostic" && r.concern && (
                    <div style={{ fontSize: 13, marginBottom: 8 }}>
                      <span style={{ fontWeight: 700 }}>Reported concern: </span>
                      {r.concern}
                    </div>
                  )}

                  {r.summary && (
                    <div
                      style={{
                        fontSize: 13,
                        lineHeight: 1.55,
                        marginBottom: 10,
                        whiteSpace: "pre-wrap",
                      }}
                    >
                      {r.summary}
                    </div>
                  )}

                  {work.map((w) => (
                    <div
                      key={w.id}
                      style={{
                        borderLeft: "3px solid " + C.brassDark,
                        paddingLeft: 12,
                        marginBottom: 10,
                      }}
                    >
                      <div style={{ fontWeight: 800, fontSize: 13.5 }}>
                        {w.title}
                      </div>
                      {w.detail && (
                        <div
                          style={{
                            fontSize: 13,
                            lineHeight: 1.5,
                            marginTop: 3,
                            whiteSpace: "pre-wrap",
                          }}
                        >
                          {w.detail}
                        </div>
                      )}
                      {w.parts && (
                        <div
                          style={{ fontSize: 12, color: C.mute, marginTop: 3 }}
                        >
                          Parts: {w.parts}
                        </div>
                      )}
                      {w.sub && w.sub !== "Self" && (
                        <div
                          style={{
                            fontSize: 12,
                            color: C.brassDark,
                            marginTop: 3,
                            fontWeight: 700,
                          }}
                        >
                          Performed by: {w.sub}
                        </div>
                      )}
                      {w.photos && w.photos.length > 0 && (
                        <div
                          style={{
                            display: "flex",
                            gap: 8,
                            marginTop: 8,
                            flexWrap: "wrap",
                          }}
                        >
                          {w.photos.map((ph) => {
                            const src = photoSrc(ph);
                            if (!src) return null;
                            return (
                              <img
                                key={ph.id}
                                src={src}
                                alt=""
                                className="report-photo"
                                style={{
                                  width: 140,
                                  height: 105,
                                  objectFit: "cover",
                                  borderRadius: 6,
                                  border: "1px solid " + C.line,
                                }}
                              />
                            );
                          })}
                        </div>
                      )}
                    </div>
                  ))}

                  {r.type === "diagnostic" && r.diagnosis && (
                    <div style={{ fontSize: 13, marginTop: 6 }}>
                      <span style={{ fontWeight: 700 }}>Diagnosis: </span>
                      {r.diagnosis}
                    </div>
                  )}
                  {r.recommendations && (
                    <div style={{ fontSize: 13, marginTop: 6 }}>
                      <span style={{ fontWeight: 700 }}>
                        {r.type === "diagnostic"
                          ? "Recommended repair: "
                          : "Recommendations: "}
                      </span>
                      {r.recommendations}
                    </div>
                  )}

                  {finds.length > 0 && (
                    <div style={{ marginTop: 10 }}>
                      <div
                        style={{
                          fontFamily: "ui-monospace, Menlo, monospace",
                          fontSize: 10,
                          fontWeight: 700,
                          letterSpacing: "0.1em",
                          color: C.mute,
                          textTransform: "uppercase",
                          marginBottom: 4,
                        }}
                      >
                        Items noted
                      </div>
                      {finds.map((f) => (
                        <div
                          key={f.id}
                          style={{
                            display: "flex",
                            gap: 10,
                            padding: "4px 0",
                            borderBottom: "1px dotted " + C.line,
                            fontSize: 13,
                          }}
                        >
                          <span
                            style={{
                              fontFamily: "ui-monospace, Menlo, monospace",
                              fontSize: 11,
                              fontWeight: 700,
                              color: STATUS[f.status].color,
                              minWidth: 62,
                            }}
                          >
                            {STATUS[f.status].short}
                          </span>
                          <span>
                            <strong>{f.name}</strong>
                            {f.note ? " : " + f.note : ""}
                          </span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </ReportBlock>

          {/* Footer */}
          <div
            style={{
              borderTop: "2px solid " + C.ink,
              marginTop: 26,
              paddingTop: 14,
              display: "flex",
              justifyContent: "space-between",
              gap: 12,
              flexWrap: "wrap",
            }}
          >
            <div>
              <div style={{ fontWeight: 800, fontSize: 13 }}>
                Coastal Marine Pro
              </div>
              <div style={{ fontSize: 12, color: C.mute }}>
                Mobile marine service · Bradenton / Sarasota / St. Pete
              </div>
            </div>
            <div
              style={{
                fontFamily: "ui-monospace, Menlo, monospace",
                fontSize: 11,
                color: C.brassDark,
                letterSpacing: "0.14em",
              }}
            >
              DOCUMENTED. MAINTAINED. READY.
            </div>
          </div>
        </div>
      </div>
      <div style={{ height: 30 }} className="no-print" />
    </div>
  );
}

/* ====================== work list screen ====================== */
function TasksScreen({ vessel, tasks, setTasks, back, setToast }) {
  const open = tasks.filter((t) => t.status !== "done");
  const done = tasks.filter((t) => t.status === "done");
  const [showDone, setShowDone] = useState(false);

  function addTask() {
    setTasks([
      {
        id: uid(),
        title: "",
        detail: "",
        photos: [],
        createdISO: new Date().toISOString(),
        status: "open",
      },
      ...tasks,
    ]);
  }
  function patchTask(id, patch) {
    setTasks(
      tasks.map((t) =>
        t.id === id
          ? { ...t, ...(typeof patch === "function" ? patch(t) : patch) }
          : t
      )
    );
  }
  function completeTask(id) {
    setTasks(
      tasks.map((t) =>
        t.id === id
          ? { ...t, status: "done", doneISO: new Date().toISOString() }
          : t
      )
    );
  }
  function reopenTask(id) {
    setTasks(
      tasks.map((t) =>
        t.id === id ? { ...t, status: "open", doneISO: null } : t
      )
    );
  }
  function deleteTask(t) {
    if (!confirm("Delete this work list item permanently?")) return;
    (t.photos || []).forEach((ph) => delPhoto(ph.id));
    setTasks(tasks.filter((x) => x.id !== t.id));
  }

  return (
    <div>
      <TopBar sub={vessel.name + " - Work List"} onBack={back} />
      <div style={{ maxWidth: 760, margin: "0 auto", padding: 18 }}>
        <div
          style={{
            fontSize: 13.5,
            lineHeight: 1.6,
            color: C.inkSoft,
            marginBottom: 14,
          }}
        >
          Owner requests and items to handle on a future visit. Log them the
          moment the text comes in. Open items appear automatically when you
          start a report on this vessel, with a one-tap button to log them as
          work performed.
        </div>
        <PrimaryBtn onClick={addTask} style={{ width: "100%", marginBottom: 16 }}>
          + Add work list item
        </PrimaryBtn>
        {open.length === 0 && (
          <div style={{ color: C.mute, fontSize: 14, marginBottom: 16 }}>
            No open items.
          </div>
        )}
        {open.map((t) => (
          <TaskCard
            key={t.id}
            task={t}
            onPatch={(p) => patchTask(t.id, p)}
            onComplete={() => completeTask(t.id)}
            onDelete={() => deleteTask(t)}
            setToast={setToast}
          />
        ))}
        {done.length > 0 && (
          <button
            onClick={() => setShowDone(!showDone)}
            style={{ ...smallBtn(), width: "100%", marginTop: 8, padding: "10px" }}
          >
            {showDone ? "Hide" : "Show"} completed ({done.length})
          </button>
        )}
        {showDone &&
          done.map((t) => (
            <div
              key={t.id}
              style={{
                background: C.card,
                border: "1px solid " + C.line,
                borderLeft: "5px solid " + C.good,
                borderRadius: 10,
                padding: "10px 14px",
                marginTop: 10,
              }}
            >
              <div
                style={{
                  display: "flex",
                  alignItems: "center",
                  gap: 10,
                  flexWrap: "wrap",
                }}
              >
                <div style={{ flex: 1, minWidth: 140 }}>
                  <div
                    style={{
                      fontWeight: 700,
                      fontSize: 13,
                      textDecoration: "line-through",
                      color: C.mute,
                    }}
                  >
                    {t.title || "Untitled item"}
                  </div>
                  <div style={{ fontSize: 11, color: C.mute }}>
                    Completed {t.doneISO ? dateLabel(t.doneISO) : ""}
                  </div>
                </div>
                <button onClick={() => reopenTask(t.id)} style={smallBtn()}>
                  Reopen
                </button>
                <button
                  onClick={() => deleteTask(t)}
                  style={{ ...smallBtn(), color: C.action, borderColor: C.action }}
                >
                  ✕
                </button>
              </div>
            </div>
          ))}
        <div style={{ height: 40 }} />
      </div>
    </div>
  );
}

function TaskCard({ task, onPatch, onComplete, onDelete, setToast }) {
  const fileRef = useRef(null);
  return (
    <div
      style={{
        background: C.card,
        border: "1px solid " + C.line,
        borderLeft: "5px solid " + C.monitor,
        borderRadius: 10,
        padding: 12,
        marginBottom: 12,
      }}
    >
      <div style={{ fontSize: 11, color: C.mute, marginBottom: 6 }}>
        Added {dateLabel(task.createdISO)}
      </div>
      <div style={{ display: "flex", gap: 8 }}>
        <input
          value={task.title}
          onChange={(e) => onPatch({ title: e.target.value })}
          placeholder="What to check or fix, e.g. Owner reports livewell pump weak"
          style={{ ...inputStyle(), flex: 1, fontWeight: 700 }}
        />
        <button
          onClick={onDelete}
          aria-label="Delete item"
          style={{ ...smallBtn(), color: C.action, borderColor: C.action }}
        >
          ✕
        </button>
      </div>
      <textarea
        value={task.detail}
        onChange={(e) => onPatch({ detail: e.target.value })}
        placeholder="Details from the owner, parts to bring, where it is on the boat."
        rows={2}
        style={{ ...inputStyle(), resize: "vertical", fontSize: 13, marginTop: 8 }}
      />
      <PhotoStrip
        photos={task.photos || []}
        onRemove={(pid) => {
          onPatch((prev) => ({
            photos: (prev.photos || []).filter((x) => x.id !== pid),
          }));
          delPhoto(pid);
        }}
        onAddClick={() => fileRef.current && fileRef.current.click()}
        fileRef={fileRef}
        onFiles={(e) => addPhotosFromInput(e, onPatch, setToast)}
        addLabel={"+ Photo"}
      />
      <button
        onClick={onComplete}
        style={{
          marginTop: 10,
          width: "100%",
          padding: "10px",
          background: C.good,
          border: "none",
          borderRadius: 8,
          color: "#fff",
          fontWeight: 800,
          fontSize: 12,
          letterSpacing: "0.04em",
          textTransform: "uppercase",
        }}
      >
        Mark complete (without logging)
      </button>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
