/* ============================================================

// Critical-systems priority for the GOOD TO GO list (lower = higher priority).
// Matched by case-insensitive keyword against the item name.
const CRITICAL_ORDER = [
  ["engine", 0], ["motor", 0],
  ["generator", 1], ["gen ", 1],
  ["steering", 2], ["helm", 2],
  ["battery", 3], ["batteries", 3], ["electrical", 3], ["voltage", 3],
  ["charger", 3], ["shore power", 3], ["terminal", 3],
  ["bilge", 4], ["pump", 4],
  ["fuel", 5], ["water separator", 5],
  ["hull", 6], ["through-hull", 6], ["seacock", 6], ["anode", 6], ["bottom", 6],
  ["gelcoat", 6], ["trim tab", 6],
  ["air conditioning", 7], ["ac ", 7], ["seakeeper", 7], ["windlass", 7],
  ["livewell", 7], ["washdown", 7], ["freshwater", 7], ["head", 7],
  ["nav", 7], ["light", 7], ["electronics", 7],
  ["hatch", 8], ["upholstery", 8], ["canvas", 8], ["safety", 8], ["deck", 8],
];
function criticalRank(name) {
  const n = (name || "").toLowerCase();
  for (const [kw, rank] of CRITICAL_ORDER) {
    if (n.indexOf(kw) !== -1) return rank;
  }
  return 6.5; // unknown items sit mid-pack
}

// Default Boat Stock, trimmed per vessel like the checklist.
const DEFAULT_STOCK = {
  engine: ["Engine oil", "Oil filter", "Fuel filter / water separator", "Impeller", "Gear lube", "Spark plugs"],
  generator: ["Generator oil", "Generator oil filter", "Generator impeller", "Generator fuel filter"],
  boat: ["Steering fluid", "Descaling fluid", "Strainer baskets", "Zincs / anodes", "Coolant"],

const STATUS = {

const TYPE_META = {

    color: C.ink,
    badge: null, // monthly uses the readiness verdict as its badge

const uid = () =>
  Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
const monthLabel = (d) =>
  d.toLocaleDateString("en-US", { month: "long", year: "numeric" });

/* ---------- IndexedDB key-value storage ---------- */
let lastError = "";
let _dbp = null;
function openDB() {
  if (_dbp) return _dbp;
  _dbp = new Promise((resolve, reject) => {
    const req = indexedDB.open("coastal-marine-pro", 1);
    req.onupgradeneeded = () => {
      req.result.createObjectStore("kv");
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
  return _dbp;
}
function idb(mode, fn) {
  return openDB().then(
    (d) =>
      new Promise((resolve, reject) => {
        const tx = d.transaction("kv", mode);
        const req = fn(tx.objectStore("kv"));
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      })
  );
}
async function sGet(key) {
  try {
    const v = await idb("readonly", (s) => s.get(key));
    return v === undefined ? null : v;
  } catch (e) {
    lastError = String((e && e.message) || e);
    return null;
  }
}
async function sSet(key, val) {
  try {
    await idb("readwrite", (s) => s.put(val, key));
    return true;
  } catch (e) {
    lastError = String((e && e.message) || e);
    console.error("storage set failed", e);
    return false;
  }
}
async function sDel(key) {
  try {
    await idb("readwrite", (s) => s.delete(key));
  } catch (e) {}
}
async function sKeys() {
  try {
    return (await idb("readonly", (s) => s.getAllKeys())) || [];
  } catch (e) {
    return [];
  }
}

/* ---------- photo persistence ---------- */
const photoCache = {}; // id -> dataUrl for this session
let subListCache = null;
// Annotation bridge: App registers an opener; photo flows call requestAnnotation.
let _annotateOpener = null;
function registerAnnotator(fn) { _annotateOpener = fn; }
function requestAnnotation(dataUrl) {
  // returns a Promise that resolves to the final (possibly annotated) dataUrl
  if (!_annotateOpener) return Promise.resolve(dataUrl);
  return new Promise((resolve) => _annotateOpener(dataUrl, resolve));
}
async function getSubs() {
  if (subListCache) return subListCache;
  subListCache = (await sGet("subs")) || [];
  return subListCache;
}
async function rememberSub(name) {
  const n = (name || "").trim();
  if (!n || n === "Self") return;
  const list = await getSubs();
  if (!list.some((s) => s.toLowerCase() === n.toLowerCase())) {
    subListCache = [...list, n].sort();
    await sSet("subs", subListCache);
  }
}

async function savePhoto(id, dataUrl) {
  photoCache[id] = dataUrl;
  return sSet("ph:" + id, dataUrl);
}
async function loadPhoto(id) {
  if (photoCache[id]) return photoCache[id];
  const v = await sGet("ph:" + id);
  if (v) photoCache[id] = v;
  return v;
}
async function delPhoto(id) {
  await sDel("ph:" + id);
  delete photoCache[id];
}
async function copyPhoto(id) {
  const srcUrl = await loadPhoto(id);
  if (!srcUrl) return null;
  const nid = uid();
  const ok = await savePhoto(nid, srcUrl);
  return ok ? nid : null;
}
async function hydratePhotos(insp) {
  const ids = [];
  (insp.sections || []).forEach((s) =>
    (s.items || []).forEach((it) =>
      (it.photos || []).forEach((p) => {
        if (!p.dataUrl) ids.push(p.id);
      })
    )
  );
  (insp.workLog || []).forEach((w) => {
    (w.photos || []).forEach((p) => {
      if (!p.dataUrl) ids.push(p.id);
    });
    (w.invoicePhotos || []).forEach((p) => {
      if (!p.dataUrl) ids.push(p.id);
    });
  });
  for (const id of ids) await loadPhoto(id);
}
const photoSrc = (p) => p.dataUrl || photoCache[p.id] || null;

/* ---------- photo compression ---------- */
function compressImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const MAX = 1100;
        let { width, height } = img;
        if (width > MAX || height > MAX) {
          const r = Math.min(MAX / width, MAX / height);
          width = Math.round(width * r);
          height = Math.round(height * r);
        }
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", 0.65));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function buildInspection(vesselId, type, templateSections) {
  const now = new Date();
  return {
    id: uid(),
    type: type || "monthly",
    vesselId,
    dateISO: now.toISOString(),
    label: monthLabel(now),
    engineHours: "",
    generatorHours: "",
    reportTitle: "",
    concern: "",
    diagnosis: "",
    summary: "",
    recommendations: "",
    invoiceNote: "",
    workLog: [],
    stock: [],
    migratedV2: true,
    preparedBy: "Cory - Coastal Marine Pro",
    sections:
      (type || "monthly") === "monthly"
        ? (templateSections || DEFAULT_SECTIONS).map((s) => ({
            name: s.name,
            items: s.items.map((n) => ({
              id: uid(),
              name: n,
              status: null,
              note: "",
              photos: [],
            })),
          }))
        : [],
  };
}

function verdictOf(insp) {
  let action = 0,
    monitor = 0,
    good = 0,
    pending = 0;
  (insp.sections || []).forEach((s) =>
    s.items.forEach((it) => {
      if (it.status === "action") action++;
      else if (it.status === "monitor") monitor++;
      else if (it.status === "good") good++;
      else if (it.status !== "na") pending++;
    })
  );
  const v = action ? "action" : monitor ? "monitor" : "ready";
  return { v, action, monitor, good, pending };
}

// Build the display name for a report based on type.
function reportName(insp) {
  const t = insp.type || "monthly";
  if (t === "monthly") return insp.label + " Checklist";
  // ignore a title that just repeats the report type word
  let title = (insp.reportTitle || "").trim();
  if (/^(diagnostic|repair|service)$/i.test(title)) title = "";
  const firstConcern = (insp.concern || "").split("\n")[0].trim();
  const firstWork =
    (insp.workLog || []).find((w) => (w.title || "").trim()) || {};
  if (t === "diagnostic")
    return "Diagnostic: " + (title || firstConcern || "Service");
  if (t === "service" || t === "repair")
    return "Repair: " + (title || (firstWork.title || "").trim() || "Service");
  return insp.label;
}

// One-time per-report migration to the current data shape.
function migrateInspection(d) {
  if (!d) return d;
  let changed = false;
  // old "service" type becomes "repair"
  if (d.type === "service") { d.type = "repair"; changed = true; }
  // ensure fields exist
  if (d.reportTitle === undefined) {
    // auto-name diagnostics from concern, repairs from first work entry
    if (d.type === "diagnostic") d.reportTitle = (d.concern || "").trim();
    else if (d.type === "repair")
      d.reportTitle = ((d.workLog && d.workLog[0] && d.workLog[0].title) || "").trim();
    else d.reportTitle = "";
    changed = true;
  }
  // work entries get a subcontractor field
  (d.workLog || []).forEach((w) => {
    if (w.sub === undefined) { w.sub = ""; changed = true; }
    if (w.invoicePhotos === undefined) { w.invoicePhotos = []; changed = true; }
  });
  // action items get an approval recommendation type
  (d.sections || []).forEach((s) =>
    (s.items || []).forEach((it) => {
      if (it.approvalKind === undefined) { it.approvalKind = "repair"; changed = true; }
    })
  );
  if (d.migratedV2 === undefined) { d.migratedV2 = true; changed = true; }
  return d;
}

/* ============================================================ */
function App() {
  const [screen, setScreen] = useState("vessels"); // vessels | vessel | inspect | report | dossier | backup
  const [vessels, setVessels] = useState([]);
  const [activeVessel, setActiveVessel] = useState(null);
  const [index, setIndex] = useState([]);
  const [insp, setInsp] = useState(null);
  const [dossier, setDossier] = useState(null);
  const [tasks, setTasks] = useState([]);
  const [loading, setLoading] = useState(true);
  const [toast, setToast] = useState("");
  const [saveState, setSaveState] = useState({ status: "idle", at: null });
  const [anno, setAnno] = useState(null); // { src, resolve }
  const saveTimer = useRef(null);
  const tasksTimer = useRef(null);
  const indexRef = useRef(index);
  const inspRef = useRef(insp);

  useEffect(() => {
    indexRef.current = index;
  }, [index]);
  useEffect(() => {
    inspRef.current = insp;
  }, [insp]);

  useEffect(() => {
    (async () => {
      const v = await sGet("vessels");
      setVessels(v || []);
      setLoading(false);
    })();
    registerAnnotator((src, resolve) => setAnno({ src, resolve }));
  }, []);

  useEffect(() => {
    if (!toast) return;
    const t = setTimeout(() => setToast(""), 2600);
    return () => clearTimeout(t);
  }, [toast]);

  /* autosave active report */
  useEffect(() => {
    if (!insp) return;
    setSaveState((s) =>
      s.status === "error" ? s : { status: "pending", at: s.at }
    );
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => persist(insp), 600);
    return () => clearTimeout(saveTimer.current);
  }, [insp]);

  /* autosave work list */
  useEffect(() => {
    if (!activeVessel) return;
    clearTimeout(tasksTimer.current);
    tasksTimer.current = setTimeout(() => {
      sSet("tasks:" + activeVessel.id, tasks);
    }, 500);
    return () => clearTimeout(tasksTimer.current);
  }, [tasks]);

  async function persist(snapshot) {
    if (!snapshot) return;
    setSaveState((s) => ({ status: "saving", at: s.at }));
    if ((snapshot.type || "monthly") === "monthly" && snapshot.stock) {
      await sSet(
        "stock:" + snapshot.vesselId,
        snapshot.stock.map((s) => ({ id: s.id, cat: s.cat, name: s.name, low: false }))
      );
    }
    const ok = await sSet("insp:" + snapshot.id, snapshot);
    if (!ok) {
      setSaveState({ status: "error", at: new Date() });
      setToast("Save failed: " + (lastError || "unknown error") + ". Tap Save Now to retry.");
      return;
    }
    const { v, action, monitor } = verdictOf(snapshot);
    const entry = {
      id: snapshot.id,
      type: snapshot.type || "monthly",
      label: snapshot.label,
      name: reportName(snapshot),
      dateISO: snapshot.dateISO,
      verdict: v,
      action,
      monitor,
    };
    const idx = [
      ...indexRef.current.filter((e) => e.id !== snapshot.id),
      entry,
    ].sort((a, b) => new Date(b.dateISO) - new Date(a.dateISO));
    setIndex(idx);
    await sSet("idx:" + snapshot.vesselId, idx);
    setSaveState({ status: "saved", at: new Date() });
  }

  function saveNow() {
    clearTimeout(saveTimer.current);
    persist(inspRef.current);
  }

  async function saveVessels(next) {
    setVessels(next);
    const ok = await sSet("vessels", next);
    if (!ok) setToast("Vessel list did not save: " + (lastError || ""));
  }

  async function openVessel(v) {
    setActiveVessel(v);
    const idx = await sGet("idx:" + v.id);
    setIndex(idx || []);
    const t = (await sGet("tasks:" + v.id)) || [];
    for (const task of t)
      for (const ph of task.photos || []) await loadPhoto(ph.id);
    setTasks(t);
    setScreen("vessel");
  }

  async function startInspection(type) {
    let template = null;
    if (type === "monthly") {
      const lastMonthly = index.find(
        (e) => (e.type || "monthly") === "monthly"
      );
      if (lastMonthly) {
        const prev = await sGet("insp:" + lastMonthly.id);
        if (prev && prev.sections && prev.sections.length) {
          template = prev.sections.map((s) => ({
            name: s.name,
            items: s.items.map((it) => it.name),
          }));
        }
      }
    }
    const fresh = buildInspection(activeVessel.id, type, template);
    if (type === "monthly") {
      let stockTpl = await sGet("stock:" + activeVessel.id);
      if (!stockTpl) {
        stockTpl = [];
        Object.entries(DEFAULT_STOCK).forEach(([cat, items]) =>
          items.forEach((n) =>
            stockTpl.push({ id: uid(), cat, name: n, low: false })
          )
        );
      }
      fresh.stock = stockTpl.map((s) => ({
        id: uid(),
        cat: s.cat,
        name: s.name,
        low: false,
      }));
    }
    setSaveState({ status: "idle", at: null });
    setInsp(fresh);
    setScreen("inspect");
  }

  async function openInspection(id, target) {
    let data = await sGet("insp:" + id);
    if (!data) {
      setToast("Could not load that report.");
      return;
    }
    data = migrateInspection(data);
    await hydratePhotos(data);
    setSaveState({ status: "saved", at: new Date() });
    setInsp(data);
    setScreen(target);
  }

  async function duplicateInspection(id) {
    let data = await sGet("insp:" + id);
    if (!data) {
      setToast("Could not load that report.");
      return;
    }
    data = migrateInspection(data);
    await hydratePhotos(data);
    // deep clone, new id, copy photos to new ids so they're independent
    const clone = JSON.parse(JSON.stringify(data));
    clone.id = uid();
    async function cloneList(arr) {
      for (const ph of arr || []) {
        const nid = await copyPhoto(ph.id);
        if (nid) ph.id = nid;
      }
    }
    for (const s of clone.sections || [])
      for (const it of s.items || []) await cloneList(it.photos);
    for (const w of clone.workLog || []) {
      await cloneList(w.photos);
      await cloneList(w.invoicePhotos);
    }
    // keep same date/title so user just tweaks; mark as fresh editable
    setSaveState({ status: "idle", at: null });
    setInsp(clone);
    setScreen("inspect");
    setToast("Duplicated. Change the date and details for this entry.");
  }

  async function deleteInspection(id) {
    const data = await sGet("insp:" + id);
    if (data) {
      const ids = [];
      (data.sections || []).forEach((s) =>
        s.items.forEach((it) =>
          (it.photos || []).forEach((p) => {
            if (!p.dataUrl) ids.push(p.id);
          })
        )
      );
      (data.workLog || []).forEach((w) =>
        (w.photos || []).forEach((p) => {
          if (!p.dataUrl) ids.push(p.id);
        })
      );
      for (const pid of ids) await delPhoto(pid);
    }
    await sDel("insp:" + id);
    const idx = index.filter((e) => e.id !== id);
    setIndex(idx);
    await sSet("idx:" + activeVessel.id, idx);
  }

  async function deleteVessel(v) {
    if (
      !confirm(
        "Delete " +
          v.name +
          " and ALL of its reports and photos permanently? This cannot be undone."
      )
    )
      return;
    const idx = (await sGet("idx:" + v.id)) || [];
    for (const e of idx) {
      const data = await sGet("insp:" + e.id);
      if (data) {
        const ids = [];
        (data.sections || []).forEach((s) =>
          s.items.forEach((it) =>
            (it.photos || []).forEach((p) => {
              if (!p.dataUrl) ids.push(p.id);
            })
          )
        );
        (data.workLog || []).forEach((w) =>
          (w.photos || []).forEach((p) => {
            if (!p.dataUrl) ids.push(p.id);
          })
        );
        for (const pid of ids) await delPhoto(pid);
      }
      await sDel("insp:" + e.id);
    }
    await sDel("idx:" + v.id);
    const vtasks = (await sGet("tasks:" + v.id)) || [];
    for (const t of vtasks)
      for (const ph of t.photos || []) await delPhoto(ph.id);
    await sDel("tasks:" + v.id);
    const next = vessels.filter((x) => x.id !== v.id);
    await saveVessels(next);
    setScreen("vessels");
  }

  async function openDossier() {
    const all = [];
    for (const e of index) {
      let d = await sGet("insp:" + e.id);
      if (d) {
        d = migrateInspection(d);
        await hydratePhotos(d);
        all.push(d);
      }
    }
    all.sort((a, b) => new Date(a.dateISO) - new Date(b.dateISO));
    setDossier(all);
    setScreen("dossier");
  }

  function patchItem(sectionIdx, itemId, patch) {
    setInsp((prev) => ({
      ...prev,
      sections: prev.sections.map((s, i) => {
        if (i !== sectionIdx) return s;
        return {
          ...s,
          items: s.items.map((it) =>
            it.id === itemId
              ? { ...it, ...(typeof patch === "function" ? patch(it) : patch) }
              : it
          ),
        };
      }),
    }));
  }

  function addCustomItem(sectionIdx, name) {
    setInsp((prev) => ({
      ...prev,
      sections: prev.sections.map((s, i) => {
        if (i !== sectionIdx) return s;
        return {
          ...s,
          items: [
            ...s.items,
            { id: uid(), name, status: null, note: "", photos: [] },
          ],
        };
      }),
    }));
  }

  function removeItem(sectionIdx, itemId) {
    setInsp((prev) => ({
      ...prev,
      sections: prev.sections.map((s, i) =>
        i !== sectionIdx
          ? s
          : { ...s, items: s.items.filter((it) => it.id !== itemId) }
      ),
    }));
  }

  async function pullTaskToReport(task) {
    const newPhotos = [];
    for (const ph of task.photos || []) {
      const nid = await copyPhoto(ph.id);
      if (nid) newPhotos.push({ id: nid });
    }
    setInsp((prev) => ({
      ...prev,
      workLog: [
        ...(prev.workLog || []),
        {
          id: uid(),
          title: task.title || "Owner-requested item",
          detail: task.detail || "",
          parts: "",
          photos: newPhotos,
        },
      ],
    }));
    const next = tasks.map((t) =>
      t.id === task.id
        ? { ...t, status: "done", doneISO: new Date().toISOString() }
        : t
    );
    setTasks(next);
    await sSet("tasks:" + activeVessel.id, next);
    setToast("Added to this report's work log.");
  }

  if (loading) {
    return (
      <Shell>
        <div
          style={{
            padding: 60,
            textAlign: "center",
            color: C.mute,
          }}
        >
          Loading…
        </div>
      </Shell>
    );
  }

  return (
    <Shell>
      {screen === "vessels" && (
        <VesselsScreen
          vessels={vessels}
          saveVessels={saveVessels}
          openVessel={openVessel}
          openBackup={() => setScreen("backup")}
        />
      )}
      {screen === "backup" && (
        <BackupScreen
          back={() => setScreen("vessels")}
          setToast={setToast}
          reloadVessels={async () => {
            const v = await sGet("vessels");
            setVessels(v || []);
          }}
        />
      )}
      {screen === "vessel" && activeVessel && (
        <VesselScreen
          vessel={activeVessel}
          index={index}
          taskCount={tasks.filter((t) => t.status !== "done").length}
          openTasks={() => setScreen("tasks")}
          back={() => setScreen("vessels")}
          startInspection={startInspection}
          openInspection={openInspection}
          deleteInspection={deleteInspection}
          duplicateInspection={duplicateInspection}
          deleteVessel={deleteVessel}
          openDossier={openDossier}
          saveVessel={async (updated) => {
            const next = vessels.map((x) => (x.id === updated.id ? updated : x));
            setVessels(next);
            setActiveVessel(updated);
            await sSet("vessels", next);
          }}
        />
      )}
      {screen === "tasks" && activeVessel && (
        <TasksScreen
          vessel={activeVessel}
          tasks={tasks}
          setTasks={setTasks}
          back={() => setScreen("vessel")}
          setToast={setToast}
        />
      )}
      {screen === "inspect" && insp && (
        <InspectScreen
          vessel={activeVessel}
          insp={insp}
          openTasksList={tasks.filter((t) => t.status !== "done")}
          pullTask={pullTaskToReport}
          setInsp={setInsp}
          patchItem={patchItem}
          addCustomItem={addCustomItem}
          removeItem={removeItem}
          setToast={setToast}
          saveState={saveState}
          saveNow={saveNow}
          back={async () => {
            saveNow();
            const idx = await sGet("idx:" + activeVessel.id);
            setIndex(idx || indexRef.current);
            setScreen("vessel");
          }}
          viewReport={() => {
            saveNow();
            setScreen("report");
          }}
        />
      )}
      {screen === "report" && insp && (
        <ReportScreen
          vessel={activeVessel}
          insp={insp}
          setToast={setToast}
          back={() => setScreen("inspect")}
        />
      )}
      {screen === "dossier" && dossier && (
        <DossierScreen
          vessel={activeVessel}
          reports={dossier}
          setToast={setToast}
          back={() => setScreen("vessel")}
        />
      )}
      {toast && <Toast text={toast} />}
      {anno && (
        <PhotoAnnotator
          src={anno.src}
          onDone={(finalUrl) => {
            anno.resolve(finalUrl);
            setAnno(null);
          }}
        />
      )}
    </Shell>
  );
}

/* ====================== pdf export ====================== */
async function exportPDF(elId, filename, setToast) {
  const el = document.getElementById(elId);
  if (!el || !window.html2pdf) {
    if (setToast) setToast("PDF tool not ready. Use Print as a backup.");
    return;
  }
  if (setToast) setToast("Building PDF\u2026");
  const opt = {
    margin: 0,
    filename: filename + ".pdf",
    image: { type: "jpeg", quality: 0.92 },
    html2canvas: { scale: 2, useCORS: true, backgroundColor: "#ffffff" },
    jsPDF: { unit: "pt", format: "letter", orientation: "portrait" },
    pagebreak: { mode: ["css", "legacy"], avoid: ".report-item" },
  };
  try {
    await window.html2pdf().set(opt).from(el).save();
    if (setToast) setToast("PDF saved. Check your downloads or share sheet.");
  } catch (e) {
    if (setToast) setToast("PDF failed. Use Print as a backup.");
  }
}

/* ====================== photo annotator ====================== */
function PhotoAnnotator({ src, onDone }) {
  const imgWrapRef = useRef(null);
  const imgRef = useRef(null);
  const [marks, setMarks] = useState([]); // {id,type:'circle'|'label',x,y,size,text}
  const [size, setSize] = useState("large"); // small | large
  const [mode, setMode] = useState("circle"); // circle | label
  const [natural, setNatural] = useState({ w: 0, h: 0 });
  const [busy, setBusy] = useState(false);

  function onImgLoad() {
    const im = imgRef.current;
    if (im) setNatural({ w: im.naturalWidth, h: im.naturalHeight });
  }

  function place(e) {
    const wrap = imgWrapRef.current;
    if (!wrap) return;
    const rect = wrap.getBoundingClientRect();
    const pt = e.touches && e.touches[0] ? e.touches[0] : e;
    const x = (pt.clientX - rect.left) / rect.width;
    const y = (pt.clientY - rect.top) / rect.height;
    if (x < 0 || x > 1 || y < 0 || y > 1) return;
    if (mode === "circle") {
      setMarks((m) => [
        ...m,
        { id: uid(), type: "circle", x, y, size },
      ]);
    } else {
      const text = window.prompt("Label text:", "");
      if (text && text.trim()) {
        setMarks((m) => [
          ...m,
          { id: uid(), type: "label", x, y, text: text.trim() },
        ]);
      }
    }
  }

  function undo() {
    setMarks((m) => m.slice(0, -1));
  }
  function clearAll() {
    setMarks([]);
  }

  async function bakeAndDone() {
    setBusy(true);
    try {
      const im = imgRef.current;
      const W = natural.w || im.naturalWidth;
      const H = natural.h || im.naturalHeight;
      const canvas = document.createElement("canvas");
      canvas.width = W;
      canvas.height = H;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(im, 0, 0, W, H);
      const base = Math.min(W, H);
      const stroke = Math.max(4, base * 0.012);
      ctx.strokeStyle = "#E0531F";
      ctx.fillStyle = "#E0531F";
      ctx.lineWidth = stroke;
      marks.forEach((mk) => {
        if (mk.type === "circle") {
          const r = (mk.size === "small" ? 0.09 : 0.16) * base;
          ctx.beginPath();
          ctx.arc(mk.x * W, mk.y * H, r, 0, Math.PI * 2);
          ctx.stroke();
        } else {
          const fs = Math.max(22, base * 0.045);
          ctx.font = "700 " + fs + "px Archivo, system-ui, sans-serif";
          ctx.textBaseline = "middle";
          const tw = ctx.measureText(mk.text).width;
          let tx = mk.x * W;
          if (tx + tw > W) tx = W - tw - 6;
          if (tx < 6) tx = 6;
          // subtle dark backing for legibility
          ctx.save();
          ctx.fillStyle = "rgba(0,0,0,0.35)";
          ctx.fillRect(tx - 6, mk.y * H - fs * 0.75, tw + 12, fs * 1.5);
          ctx.fillStyle = "#FF6A2B";
          ctx.fillText(mk.text, tx, mk.y * H);
          ctx.restore();
        }
      });
      const out = canvas.toDataURL("image/jpeg", 0.72);
      onDone(out);
    } catch (err) {
      onDone(src); // fall back to unannotated on any failure
    }
  }

  const btn = (active) => ({
    flex: 1,
    padding: "11px 8px",
    borderRadius: 8,
    border: "1.5px solid " + (active ? C.brass : "rgba(255,255,255,0.3)"),
    background: active ? C.brass : "transparent",
    color: "#fff",
    fontWeight: 800,
    fontSize: 13,
  });

  return (
    <div
      style={{
        position: "fixed",
        inset: 0,
        zIndex: 200,
        background: "#0A1620",
        display: "flex",
        flexDirection: "column",
      }}
    >
      <div
        style={{
          padding: "12px 16px",
          color: "#fff",
          fontWeight: 800,
          fontSize: 14,
          letterSpacing: "0.04em",
          textTransform: "uppercase",
          borderBottom: "1px solid rgba(255,255,255,0.15)",
        }}
      >
        Mark up photo
      </div>

      <div
        style={{
          flex: 1,
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          overflow: "hidden",
          padding: 10,
        }}
      >
        <div
          ref={imgWrapRef}
          onClick={place}
          style={{
            position: "relative",
            maxWidth: "100%",
            maxHeight: "100%",
            lineHeight: 0,
            touchAction: "manipulation",
          }}
        >
          <img
            ref={imgRef}
            src={src}
            alt=""
            onLoad={onImgLoad}
            style={{
              maxWidth: "100%",
              maxHeight: "70vh",
              display: "block",
              userSelect: "none",
            }}
          />
          {marks.map((mk) =>
            mk.type === "circle" ? (
              <div
                key={mk.id}
                style={{
                  position: "absolute",
                  left: mk.x * 100 + "%",
                  top: mk.y * 100 + "%",
                  width: (mk.size === "small" ? 18 : 32) + "%",
                  paddingBottom: (mk.size === "small" ? 18 : 32) + "%",
                  transform: "translate(-50%, -50%)",
                  border: "3px solid #E0531F",
                  borderRadius: "50%",
                  pointerEvents: "none",
                }}
              />
            ) : (
              <div
                key={mk.id}
                style={{
                  position: "absolute",
                  left: mk.x * 100 + "%",
                  top: mk.y * 100 + "%",
                  transform: "translate(0, -50%)",
                  color: "#FF6A2B",
                  fontWeight: 800,
                  fontSize: "clamp(14px, 4vw, 26px)",
                  background: "rgba(0,0,0,0.35)",
                  padding: "1px 6px",
                  borderRadius: 4,
                  whiteSpace: "nowrap",
                  pointerEvents: "none",
                }}
              >
                {mk.text}
              </div>
            )
          )}
        </div>
      </div>

      <div style={{ padding: "12px 16px", paddingBottom: 22 }}>
        <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
          <button onClick={() => setMode("circle")} style={btn(mode === "circle")}>
            Circle
          </button>
          <button onClick={() => setMode("label")} style={btn(mode === "label")}>
            Label
          </button>
        </div>
        {mode === "circle" && (
          <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
            <button onClick={() => setSize("small")} style={btn(size === "small")}>
              Small
            </button>
            <button onClick={() => setSize("large")} style={btn(size === "large")}>
              Large
            </button>
          </div>
        )}
        <div
          style={{
            color: "rgba(255,255,255,0.6)",
            fontSize: 12,
            textAlign: "center",
            marginBottom: 10,
          }}
        >
          Tap the photo to drop a {mode === "circle" ? "circle" : "label"}.
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <button
            onClick={undo}
            disabled={marks.length === 0}
            style={{
              ...btn(false),
              opacity: marks.length === 0 ? 0.4 : 1,
            }}
          >
            Undo
          </button>
          <button onClick={clearAll} style={btn(false)}>
            Clear
          </button>
          <button
            onClick={bakeAndDone}
            disabled={busy}
            style={{
              flex: 2,
              padding: "11px 8px",
              borderRadius: 8,
              border: "none",
              background: C.good,
              color: "#fff",
              fontWeight: 800,
              fontSize: 14,
              textTransform: "uppercase",
              letterSpacing: "0.04em",
            }}
          >
            {busy ? "Saving…" : marks.length ? "Save photo" : "Use as-is"}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ====================== backup screen ====================== */
function BackupScreen({ back, setToast, reloadVessels }) {
  const [busy, setBusy] = useState(false);
  const fileRef = useRef(null);

  async function exportBackup() {
    setBusy(true);
    try {
      const keys = await sKeys();
      const data = {};
      for (const k of keys) data[k] = await sGet(k);
      const blob = new Blob(
        [
          JSON.stringify({
            app: "coastal-marine-pro",
            version: 1,
            exported: new Date().toISOString(),
            data,
          }),
        ],
        { type: "application/json" }
      );
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download =
        "coastal-marine-pro-backup-" +
        new Date().toISOString().slice(0, 10) +
        ".json";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setToast("Backup file created. Save it somewhere safe (Files, iCloud, Drive).");
    } catch (e) {
      setToast("Backup failed: " + String((e && e.message) || e));
    }
    setBusy(false);
  }

  async function importBackup(e) {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    if (
      !confirm(
        "Restoring a backup REPLACES everything currently in the app with the backup contents. Continue?"
      )
    )
      return;
    setBusy(true);
    try {
      const text = await file.text();
      const parsed = JSON.parse(text);
      if (!parsed || parsed.app !== "coastal-marine-pro" || !parsed.data)
        throw new Error("Not a Coastal Marine Pro backup file");
      const existing = await sKeys();
      for (const k of existing) await sDel(k);
      const entries = Object.entries(parsed.data);
      for (const [k, v] of entries) await sSet(k, v);
      await reloadVessels();
      setToast("Backup restored: " + entries.length + " records.");
    } catch (err) {
      setToast("Restore failed: " + String((err && err.message) || err));
    }
    setBusy(false);
  }

  async function wipeAll() {
    if (
      !confirm(
        "Delete ALL app data: vessels, reports, and photos. This cannot be undone. Continue?"
      )
    )
      return;
    setBusy(true);
    const keys = await sKeys();
    for (const k of keys) await sDel(k);
    await reloadVessels();
    setToast("All app data deleted.");
    setBusy(false);
  }

  return (
    <div>
      <TopBar sub="Backup & Data" onBack={back} />
      <div style={{ maxWidth: 760, margin: "0 auto", padding: 18 }}>
        {busy && (
          <div style={{ color: C.mute, fontSize: 13, marginBottom: 12 }}>
            Working…
          </div>
        )}
        <div
          style={{
            background: C.card,
            border: "1px solid " + C.line,
            borderRadius: 10,
            padding: 14,
            marginBottom: 16,
            fontSize: 13.5,
            lineHeight: 1.6,
            color: C.inkSoft,
          }}
        >
          Your reports and photos are stored in this phone's browser database.
          They survive closing the browser, but clearing browser data or losing
          the phone would erase them. Export a backup file after each service
          day and keep it in iCloud or Drive.
        </div>
        <PrimaryBtn onClick={exportBackup} style={{ width: "100%", marginBottom: 10 }}>
          Export full backup
        </PrimaryBtn>
        <button
          onClick={() => fileRef.current && fileRef.current.click()}
          style={{
            width: "100%",
            padding: "13px",
            background: "transparent",
            border: "2px solid " + C.ink,
            borderRadius: 8,
            color: C.ink,
            fontWeight: 800,
            fontSize: 13,
            letterSpacing: "0.04em",
            textTransform: "uppercase",
            marginBottom: 24,
          }}
        >
          Restore from backup file
        </button>
        <input
          ref={fileRef}
          type="file"
          accept="application/json"
          onChange={importBackup}
          style={{ display: "none" }}
        />
        <button
          onClick={wipeAll}
          style={{
            width: "100%",
            padding: "12px",
            background: "transparent",
            border: "1.5px solid " + C.action,
            borderRadius: 8,
            color: C.action,
            fontWeight: 800,
            fontSize: 12,
            letterSpacing: "0.06em",
            textTransform: "uppercase",
          }}
        >
          Delete all app data
        </button>
      </div>
    </div>
  );
}

function CopyRow({ label, value }) {
  const [copied, setCopied] = useState(false);
  if (!value) return null;
  function copy() {
    const done = () => {
      setCopied(true);
      setTimeout(() => setCopied(false), 1200);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(value).then(done, () => {
        promptFallback(value);
      });
    } else {
      promptFallback(value);
    }
  }
  function promptFallback(v) {
    window.prompt("Copy this value:", v);
  }
  return (
    <div
      style={{
        display: "flex",
        alignItems: "center",
        gap: 10,
        padding: "9px 0",
        borderBottom: "1px dotted " + C.line,
      }}

      <div style={{ flex: 1, minWidth: 0 }}>
        <div
          style={{
            fontFamily: "ui-monospace, Menlo, monospace",

            letterSpacing: "0.1em",
            color: C.mute,
            textTransform: "uppercase",
          }}
        >
          {label}
        </div>
        <div
          style={{
            fontFamily: "ui-monospace, Menlo, monospace",
            fontSize: 14,
            fontWeight: 700,
            wordBreak: "break-all",
          }}
        >
          {value}
        </div>
      </div>
      <button
        onClick={copy}
        style={{
          ...smallBtn(),
          flex: "0 0 auto",
          background: copied ? C.good : "transparent",
          color: copied ? "#fff" : C.ink,
          borderColor: copied ? C.good : C.line,
        }}
      >
        {copied ? "Copied" : "Copy"}
      </button>
    </div>
  );
}

/* shared photo add flow: persist each photo the moment it's taken */
async function addPhotosFromInput(e, onPatch, setToast) {
  const files = Array.from(e.target.files || []);
  e.target.value = "";
  for (const f of files) {
    try {
      const raw = await compressImage(f);
      const finalUrl = await requestAnnotation(raw);
      const id = uid();
      const ok = await savePhoto(id, finalUrl);
      if (!ok) {
        setToast("Photo save failed: " + (lastError || "unknown error"));
        continue;
      }
      onPatch((prev) => ({ photos: [...(prev.photos || []), { id }] }));
    } catch (err) {
      setToast("Couldn't process that photo.");
    }
  }
}

function ChecklistItem({ item, onPatch, onRemoveItem, setToast }) {
  const fileRef = useRef(null);
  const [expanded, setExpanded] = useState(false);
  const showDetail =
    expanded ||
    item.note ||
    item.photos.length > 0 ||
    item.status === "monitor" ||
    item.status === "action";

  return (
    <div style={{ borderBottom: "1px solid " + C.line, padding: "12px 14px" }}>
      <div
        style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}
      >
        <div style={{ flex: 1, minWidth: 160, fontSize: 14, fontWeight: 600 }}>
          {item.name}
        </div>
        <div style={{ display: "flex", gap: 5 }}>
          {Object.entries(STATUS).map(([key, s]) => (
            <button
              key={key}
              onClick={() =>
                onPatch({ status: item.status === key ? null : key })
              }
              aria-pressed={item.status === key}
              style={{
                border: "1.5px solid " + (item.status === key ? s.color : C.line),
                background: item.status === key ? s.color : "transparent",
                color: item.status === key ? "#fff" : C.mute,
                borderRadius: 6,
                padding: "6px 9px",
                fontSize: 11,
                fontWeight: 800,
                letterSpacing: "0.04em",
                fontFamily: "ui-monospace, Menlo, monospace",
              }}
            >
              {s.short}
            </button>
          ))}
        </div>
        <button
          onClick={() => setExpanded(!showDetail ? true : !expanded)}
          aria-label="Add note or photo"
          style={{
            background: "transparent",
            border: "1px solid " + C.line,
            borderRadius: 6,
            padding: "6px 9px",
            fontSize: 12,
            color: C.mute,
          }}
        >
          ＋
        </button>
      </div>
      {showDetail && (
        <div style={{ marginTop: 10 }}>
          <textarea
            value={item.note}
            onChange={(e) => onPatch({ note: e.target.value })}
            placeholder="Notes for this item (shows on client report)…"
            rows={2}
            style={{ ...inputStyle(), resize: "vertical", fontSize: 13 }}
          />
          <PhotoStrip
            photos={item.photos}
            onRemove={(pid) => {
              onPatch((prev) => ({
                photos: prev.photos.filter((x) => x.id !== pid),
              }));
              delPhoto(pid);
            }}
            onAddClick={() => fileRef.current && fileRef.current.click()}
            fileRef={fileRef}
            onFiles={(e) => addPhotosFromInput(e, onPatch, setToast)}
            addLabel={"+ Photo"}
          />
          {item.status === "action" && (
            <div style={{ marginTop: 10 }}>
              <FieldLabel>Approval needed for</FieldLabel>
              <div style={{ display: "flex", gap: 6 }}>
                {[
                  ["repair", "Approve repair"],
                  ["diagnosis", "Approve diagnosis"],
                ].map(([k, lbl]) => {
                  const on = (item.approvalKind || "repair") === k;
                  return (
                    <button
                      key={k}
                      onClick={() => onPatch({ approvalKind: k })}
                      style={{
                        flex: 1,
                        border:
                          "1.5px solid " + (on ? C.action : C.line),
                        background: on ? C.action : "transparent",
                        color: on ? "#fff" : C.mute,
                        borderRadius: 6,
                        padding: "8px 6px",
                        fontSize: 12,
                        fontWeight: 700,
                      }}
                    >
                      {lbl}
                    </button>
                  );
                })}
              </div>
            </div>
          )}
          <button
            onClick={onRemoveItem}
            style={{
              marginTop: 10,
              background: "transparent",
              border: "none",
              color: C.action,
              fontSize: 12,
              fontWeight: 700,
              padding: 0,
              textDecoration: "underline",
            }}
          >
            Remove this line item
          </button>
        </div>
      )}
    </div>
  );
}

function WorkLog({ insp, setInsp, setToast, title }) {
  const [open, setOpen] = useState(true);
  const log = insp.workLog || [];

  function addEntry() {
    setInsp((prev) => ({
      ...prev,
      workLog: [
        ...(prev.workLog || []),
        { id: uid(), title: "", detail: "", parts: "", photos: [] },
      ],
    }));
  }
  function patchEntry(id, patch) {
    setInsp((prev) => ({
      ...prev,
      workLog: (prev.workLog || []).map((e) =>
        e.id === id
          ? { ...e, ...(typeof patch === "function" ? patch(e) : patch) }
          : e
      ),
    }));
  }
  function removeEntry(id) {
    setInsp((prev) => ({
      ...prev,
      workLog: (prev.workLog || []).filter((e) => e.id !== id),
    }));
  }

  return (
    <div style={{ marginBottom: 16 }}>
      <button
        onClick={() => setOpen(!open)}
        style={{
          width: "100%",
          textAlign: "left",
          background: C.brassDark,
          color: "#fff",
          border: "none",
          borderRadius: open ? "10px 10px 0 0" : 10,
          padding: "12px 14px",
          display: "flex",
          justifyContent: "space-between",
          alignItems: "center",
        }}
      >
        <span
          style={{
            fontWeight: 800,
            letterSpacing: "0.04em",
            textTransform: "uppercase",
            fontSize: 13,
          }}
        >
          {title}
        </span>
        <span
          style={{
            fontFamily: "ui-monospace, Menlo, monospace",
            fontSize: 12,
            opacity: 0.85,
          }}
        >
          {log.length} {open ? "▾" : "▸"}
        </span>
      </button>
      {open && (
        <div
          style={{
            background: C.card,
            border: "1px solid " + C.line,
            borderTop: "none",
            borderRadius: "0 0 10px 10px",
            padding: 14,
          }}
        >
          {log.length === 0 && (
            <div style={{ fontSize: 13, color: C.mute, marginBottom: 10 }}>
              Log each item with photos. These build the vessel's permanent
              service record.
            </div>
          )}
          {log.map((e) => (
            <WorkEntry
              key={e.id}
              entry={e}
              onPatch={(p) => patchEntry(e.id, p)}
              onRemove={() => removeEntry(e.id)}
              setToast={setToast}
            />
          ))}
          <button
            onClick={addEntry}
            style={{
              width: "100%",
              padding: "11px",
              background: "transparent",
              border: "1.5px dashed " + C.brassDark,
              borderRadius: 8,

              fontWeight: 800,
              fontSize: 13,
            }}

            + Log an entry

        </div>
      )}

  );

const STOCK_CATS = [
  ["engine", "Engine stock"],
  ["generator", "Generator stock"],
  ["boat", "Boat stock"],
];
function StockSection({ insp, setInsp }) {
  const [open, setOpen] = useState(false);
  const stock = insp.stock || [];
  const [newName, setNewName] = useState({ engine: "", generator: "", boat: "" });
  function toggleLow(id) {
    setInsp((prev) => ({
      ...prev,
      stock: (prev.stock || []).map((s) =>
        s.id === id ? { ...s, low: !s.low } : s
      ),
    }));
  }
  function addItem(cat) {
    const n = (newName[cat] || "").trim();
    if (!n) return;
    setInsp((prev) => ({
      ...prev,
      stock: [...(prev.stock || []), { id: uid(), cat, name: n, low: false }],
    }));
    setNewName((s) => ({ ...s, [cat]: "" }));
  }
  function removeItem(id) {
    setInsp((prev) => ({
      ...prev,
      stock: (prev.stock || []).filter((s) => s.id !== id),
    }));
  }
  const lowCount = stock.filter((s) => s.low).length;
  return (
    <div style={{ marginBottom: 16 }}>
      <button
        onClick={() => setOpen(!open)}
        style={{
          width: "100%",
          textAlign: "left",
          background: C.inkSoft,
          color: "#fff",
          border: "none",
          borderRadius: open ? "10px 10px 0 0" : 10,
          padding: "12px 14px",
          display: "flex",
          justifyContent: "space-between",
          alignItems: "center",
        }}
      >
        <span
          style={{
            fontWeight: 800,
            letterSpacing: "0.04em",
            textTransform: "uppercase",
            fontSize: 13,
          }}
        >
          Boat Stock
        </span>
        <span
          style={{
            fontFamily: "ui-monospace, Menlo, monospace",
            fontSize: 12,
            opacity: 0.85,
          }}
        >
          {lowCount > 0 ? lowCount + " low" : "ok"} {open ? "\u25be" : "\u25b8"}
        </span>
      </button>
      {open && (
        <div
          style={{
            background: C.card,
            border: "1px solid " + C.line,
            borderTop: "none",
            borderRadius: "0 0 10px 10px",
            padding: 14,
          }}
        >
          <div style={{ fontSize: 12.5, color: C.mute, marginBottom: 12 }}>
            Tap an item to flag it LOW. Only flagged items print on the report as
            "to restock." Your list is remembered per boat.
          </div>
          {STOCK_CATS.map(([cat, label]) => {
            const items = stock.filter((s) => s.cat === cat);
            return (
              <div key={cat} style={{ marginBottom: 14 }}>
                <FieldLabel>{label}</FieldLabel>
                <div
                  style={{
                    display: "flex",
                    flexWrap: "wrap",
                    gap: 6,
                    marginBottom: 8,
                  }}
                >
                  {items.map((s) => (
                    <span
                      key={s.id}
                      style={{
                        display: "inline-flex",
                        alignItems: "center",
                        gap: 6,
                        border:
                          "1.5px solid " + (s.low ? C.action : C.line),
                        background: s.low ? C.action : "transparent",
                        color: s.low ? "#fff" : C.ink,
                        borderRadius: 16,
                        padding: "5px 10px",
                        fontSize: 12,
                        fontWeight: 600,
                      }}
                    >
                      <span onClick={() => toggleLow(s.id)} style={{ cursor: "pointer" }}>
                        {s.name}
                        {s.low ? " \u00b7 LOW" : ""}
                      </span>
                      <span
                        onClick={() => removeItem(s.id)}
                        style={{
                          cursor: "pointer",
                          opacity: 0.6,
                          fontWeight: 800,
                        }}
                      >
                        &times;
                      </span>
                    </span>
                  ))}
                </div>
                <div style={{ display: "flex", gap: 6 }}>
                  <input
                    value={newName[cat]}
                    onChange={(e) =>
                      setNewName((s) => ({ ...s, [cat]: e.target.value }))
                    }
                    onKeyDown={(e) => {
                      if (e.key === "Enter") addItem(cat);
                    }}
                    placeholder={"Add " + label.toLowerCase() + " item\u2026"}
                    style={{ ...inputStyle(), flex: 1, fontSize: 13 }}
                  />
                  <button onClick={() => addItem(cat)} style={smallBtn(true)}>
                    Add
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>

}

function SubPicker({ value, onChange }) {
  const [subs, setSubs] = useState([]);
  const [typing, setTyping] = useState(false);
  useEffect(() => {
    getSubs().then(setSubs);
  }, []);
  const isKnown = value === "" || value === "Self" || subs.includes(value);
  return (
    <div style={{ marginTop: 8 }}>
      <FieldLabel>Performed by</FieldLabel>
      {!typing && isKnown ? (
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          <select
            value={value === "" ? "Self" : value}
            onChange={(e) => {
              if (e.target.value === "__new__") {
                setTyping(true);
                onChange("");
              } else {
                onChange(e.target.value);
              }
            }}
            style={{ ...inputStyle(), flex: 1, fontSize: 13 }}
          >
            <option value="Self">Self (Coastal Marine Pro)</option>
            {subs.map((s) => (
              <option key={s} value={s}>
                {s}
              </option>
            ))}
            <option value="__new__">+ New subcontractor…</option>
          </select>
        </div>
      ) : (
        <div style={{ display: "flex", gap: 6 }}>
          <input
            autoFocus
            value={value}
            onChange={(e) => onChange(e.target.value)}
            onBlur={() => {
              if (value.trim()) rememberSub(value.trim());
              setTyping(false);
            }}
            placeholder="Subcontractor name"
            style={{ ...inputStyle(), flex: 1, fontSize: 13 }}
          />
        </div>
      )}
    </div>
  );
}

function WorkEntry({ entry, onPatch, onRemove, setToast }) {
  const fileRef = useRef(null);

  return (
    <div
      style={{
        border: "1px solid " + C.line,
        borderLeft: "4px solid " + C.brassDark,
        borderRadius: "0 8px 8px 0",
        padding: 12,
        marginBottom: 12,
      }}
    >
      <div style={{ display: "flex", gap: 8 }}>
        <input
          value={entry.title}
          onChange={(e) => onPatch({ title: e.target.value })}
          placeholder="What was done, e.g. Replaced raw water intake hose clamps"
          style={{ ...inputStyle(), flex: 1, fontWeight: 700 }}
        />
        <button
          onClick={onRemove}
          aria-label="Remove entry"
          style={{ ...smallBtn(), color: C.action, borderColor: C.action }}
        >
          ✕
        </button>
      </div>
      <textarea
        value={entry.detail}
        onChange={(e) => onPatch({ detail: e.target.value })}
        placeholder="Details: what was found, what was done, condition after."
        rows={2}
        style={{ ...inputStyle(), resize: "vertical", fontSize: 13, marginTop: 8 }}
      />
      <input
        value={entry.parts}
        onChange={(e) => onPatch({ parts: e.target.value })}
        placeholder="Parts / materials used (optional)"
        style={{ ...inputStyle(), fontSize: 13, marginTop: 8 }}
      />
      <SubPicker
        value={entry.sub || ""}
        onChange={(v) => onPatch({ sub: v })}
      />
      <PhotoStrip
        photos={entry.photos}
        onRemove={(pid) => {
          onPatch((prev) => ({
            photos: prev.photos.filter((x) => x.id !== pid),
          }));
          delPhoto(pid);
        }}
        onAddClick={() => fileRef.current && fileRef.current.click()}
        fileRef={fileRef}
        onFiles={(e) => addPhotosFromInput(e, onPatch, setToast)}
        addLabel={"+ Before / After"}
      />
      <InvoicePhotoStrip entry={entry} onPatch={onPatch} setToast={setToast} />
    </div>
  );
}

function InvoicePhotoStrip({ entry, onPatch, setToast }) {
  const fileRef = useRef(null);
  const photos = entry.invoicePhotos || [];
  return (
    <PhotoStrip
      photos={photos}
      onRemove={(pid) => {
        onPatch((prev) => ({
          invoicePhotos: (prev.invoicePhotos || []).filter((x) => x.id !== pid),
        }));
        delPhoto(pid);
      }}
      onAddClick={() => fileRef.current && fileRef.current.click()}
      fileRef={fileRef}
      onFiles={(e) =>
        addPhotosFromInput(
          e,
          (fn) =>
            onPatch((prev) => {
              const res = fn(prev.invoicePhotos ? { photos: prev.invoicePhotos } : { photos: [] });
              return { invoicePhotos: res.photos };
            }),
          setToast
        )
      }
      addLabel={"+ Sub invoice"}
    />
  );
}
