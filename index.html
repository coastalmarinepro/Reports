const { useState, useEffect, useRef, useMemo } = React;

/* ============================================================
   COASTAL MARINE PRO - Vessel Reports (standalone web app)
   Storage: IndexedDB (built into the phone browser, large
   capacity, survives closing the browser).
   Report types: Monthly Service, Post-Service, Diagnostic.
   ============================================================ */

const C = {

const STATUS = {

const TYPE_META = {
  monthly: {
    label: "Monthly Service",
    sub: "Vessel Readiness Report",
    color: C.ink,
    badge: null, // monthly uses the readiness verdict as its badge
  },
  service: {

  },
  diagnostic: {

    color: C.action,
    badge: "DIAGNOSTIC",
  },
};

const uid = () =>
  Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
const monthLabel = (d) =>
  d.toLocaleDateString("en-US", { month: "long", year: "numeric" });
const dateLabel = (iso) =>
  new Date(iso).toLocaleDateString("en-US", {
    month: "short",
    day: "numeric",
    year: "numeric",
  });

/* ---------- IndexedDB key-value storage ---------- */
let lastError = "";
let _dbp = null;
function openDB() {
  if (_dbp) return _dbp;
  _dbp = new Promise((resolve, reject) => {
    const req = indexedDB.open("coastal-marine-pro", 1);
    req.onupgradeneeded = () => {
      req.result.createObjectStore("kv");
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
  return _dbp;
}
function idb(mode, fn) {
  return openDB().then(
    (d) =>
      new Promise((resolve, reject) => {
        const tx = d.transaction("kv", mode);
        const req = fn(tx.objectStore("kv"));
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      })
  );
}
async function sGet(key) {
  try {
    const v = await idb("readonly", (s) => s.get(key));
    return v === undefined ? null : v;
  } catch (e) {
    lastError = String((e && e.message) || e);
    return null;
  }
}
async function sSet(key, val) {
  try {
    await idb("readwrite", (s) => s.put(val, key));
    return true;
  } catch (e) {
    lastError = String((e && e.message) || e);
    console.error("storage set failed", e);
    return false;
  }
}
async function sDel(key) {
  try {
    await idb("readwrite", (s) => s.delete(key));
  } catch (e) {}
}
async function sKeys() {
  try {
    return (await idb("readonly", (s) => s.getAllKeys())) || [];
  } catch (e) {
    return [];
  }
}

/* ---------- photo persistence ---------- */
const photoCache = {}; // id -> dataUrl for this session

async function savePhoto(id, dataUrl) {
  photoCache[id] = dataUrl;
  return sSet("ph:" + id, dataUrl);
}
async function loadPhoto(id) {
  if (photoCache[id]) return photoCache[id];
  const v = await sGet("ph:" + id);
  if (v) photoCache[id] = v;
  return v;
}
async function delPhoto(id) {
  await sDel("ph:" + id);
  delete photoCache[id];
}
async function copyPhoto(id) {
  const srcUrl = await loadPhoto(id);
  if (!srcUrl) return null;
  const nid = uid();
  const ok = await savePhoto(nid, srcUrl);
  return ok ? nid : null;
}
async function hydratePhotos(insp) {
  const ids = [];
  (insp.sections || []).forEach((s) =>
    (s.items || []).forEach((it) =>
      (it.photos || []).forEach((p) => {
        if (!p.dataUrl) ids.push(p.id);
      })
    )
  );
  (insp.workLog || []).forEach((w) =>
    (w.photos || []).forEach((p) => {
      if (!p.dataUrl) ids.push(p.id);
    })
  );
  for (const id of ids) await loadPhoto(id);
}
const photoSrc = (p) => p.dataUrl || photoCache[p.id] || null;

/* ---------- photo compression ---------- */
function compressImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const MAX = 1100;
        let { width, height } = img;
        if (width > MAX || height > MAX) {
          const r = Math.min(MAX / width, MAX / height);
          width = Math.round(width * r);
          height = Math.round(height * r);
        }
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", 0.65));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function buildInspection(vesselId, type, templateSections) {
  const now = new Date();
  return {
    id: uid(),
    type: type || "monthly",
    vesselId,
    dateISO: now.toISOString(),
    label: monthLabel(now),
    engineHours: "",
    concern: "",
    diagnosis: "",
    summary: "",
    recommendations: "",
    invoiceNote: "",
    workLog: [],
    preparedBy: "Cory - Coastal Marine Pro",
    sections:
      (type || "monthly") === "monthly"
        ? (templateSections || DEFAULT_SECTIONS).map((s) => ({
            name: s.name,
            items: s.items.map((n) => ({
              id: uid(),
              name: n,
              status: null,
              note: "",
              photos: [],
            })),
          }))
        : [],
  };
}

function verdictOf(insp) {
  let action = 0,
    monitor = 0,
    good = 0,
    pending = 0;
  (insp.sections || []).forEach((s) =>
    s.items.forEach((it) => {
      if (it.status === "action") action++;
      else if (it.status === "monitor") monitor++;
      else if (it.status === "good") good++;
      else if (it.status !== "na") pending++;
    })
  );
  const v = action ? "action" : monitor ? "monitor" : "ready";
  return { v, action, monitor, good, pending };
}

/* ============================================================ */
function App() {
  const [screen, setScreen] = useState("vessels"); // vessels | vessel | inspect | report | dossier | backup
  const [vessels, setVessels] = useState([]);
  const [activeVessel, setActiveVessel] = useState(null);
  const [index, setIndex] = useState([]);
  const [insp, setInsp] = useState(null);
  const [dossier, setDossier] = useState(null);
  const [tasks, setTasks] = useState([]);
  const [loading, setLoading] = useState(true);
  const [toast, setToast] = useState("");
  const [saveState, setSaveState] = useState({ status: "idle", at: null });
  const saveTimer = useRef(null);
  const tasksTimer = useRef(null);
  const indexRef = useRef(index);
  const inspRef = useRef(insp);

  useEffect(() => {
    indexRef.current = index;
  }, [index]);
  useEffect(() => {
    inspRef.current = insp;
  }, [insp]);

  useEffect(() => {
    (async () => {
      const v = await sGet("vessels");
      setVessels(v || []);
      setLoading(false);
    })();
  }, []);

  useEffect(() => {
    if (!toast) return;
    const t = setTimeout(() => setToast(""), 2600);
    return () => clearTimeout(t);
  }, [toast]);

  /* autosave active report */
  useEffect(() => {
    if (!insp) return;
    setSaveState((s) =>
      s.status === "error" ? s : { status: "pending", at: s.at }
    );
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => persist(insp), 600);
    return () => clearTimeout(saveTimer.current);
  }, [insp]);

  /* autosave work list */
  useEffect(() => {
    if (!activeVessel) return;
    clearTimeout(tasksTimer.current);
    tasksTimer.current = setTimeout(() => {
      sSet("tasks:" + activeVessel.id, tasks);
    }, 500);
    return () => clearTimeout(tasksTimer.current);
  }, [tasks]);

  async function persist(snapshot) {
    if (!snapshot) return;
    setSaveState((s) => ({ status: "saving", at: s.at }));
    const ok = await sSet("insp:" + snapshot.id, snapshot);
    if (!ok) {
      setSaveState({ status: "error", at: new Date() });
      setToast("Save failed: " + (lastError || "unknown error") + ". Tap Save Now to retry.");
      return;
    }
    const { v, action, monitor } = verdictOf(snapshot);
    const entry = {
      id: snapshot.id,
      type: snapshot.type || "monthly",
      label: snapshot.label,
      dateISO: snapshot.dateISO,
      verdict: v,
      action,
      monitor,
    };
    const idx = [
      ...indexRef.current.filter((e) => e.id !== snapshot.id),
      entry,
    ].sort((a, b) => new Date(b.dateISO) - new Date(a.dateISO));
    setIndex(idx);
    await sSet("idx:" + snapshot.vesselId, idx);
    setSaveState({ status: "saved", at: new Date() });
  }

  function saveNow() {
    clearTimeout(saveTimer.current);
    persist(inspRef.current);
  }

  async function saveVessels(next) {
    setVessels(next);
    const ok = await sSet("vessels", next);
    if (!ok) setToast("Vessel list did not save: " + (lastError || ""));
  }

  async function openVessel(v) {
    setActiveVessel(v);
    const idx = await sGet("idx:" + v.id);
    setIndex(idx || []);
    const t = (await sGet("tasks:" + v.id)) || [];
    for (const task of t)
      for (const ph of task.photos || []) await loadPhoto(ph.id);
    setTasks(t);
    setScreen("vessel");
  }

  async function startInspection(type) {
    let template = null;
    if (type === "monthly") {
      const lastMonthly = index.find(
        (e) => (e.type || "monthly") === "monthly"
      );
      if (lastMonthly) {
        const prev = await sGet("insp:" + lastMonthly.id);
        if (prev && prev.sections && prev.sections.length) {
          template = prev.sections.map((s) => ({
            name: s.name,
            items: s.items.map((it) => it.name),
          }));
        }
      }
    }
    const fresh = buildInspection(activeVessel.id, type, template);
    setSaveState({ status: "idle", at: null });
    setInsp(fresh);
    setScreen("inspect");
  }

  async function openInspection(id, target) {
    const data = await sGet("insp:" + id);
    if (!data) {
      setToast("Could not load that report.");
      return;
    }
    await hydratePhotos(data);
    setSaveState({ status: "saved", at: new Date() });
    setInsp(data);
    setScreen(target);
  }

  async function deleteInspection(id) {
    const data = await sGet("insp:" + id);
    if (data) {
      const ids = [];
      (data.sections || []).forEach((s) =>
        s.items.forEach((it) =>
          (it.photos || []).forEach((p) => {
            if (!p.dataUrl) ids.push(p.id);
          })
        )
      );
      (data.workLog || []).forEach((w) =>
        (w.photos || []).forEach((p) => {
          if (!p.dataUrl) ids.push(p.id);
        })
      );
      for (const pid of ids) await delPhoto(pid);
    }
    await sDel("insp:" + id);
    const idx = index.filter((e) => e.id !== id);
    setIndex(idx);
    await sSet("idx:" + activeVessel.id, idx);
  }

  async function deleteVessel(v) {
    if (
      !confirm(
        "Delete " +
          v.name +
          " and ALL of its reports and photos permanently? This cannot be undone."
      )
    )
      return;
    const idx = (await sGet("idx:" + v.id)) || [];
    for (const e of idx) {
      const data = await sGet("insp:" + e.id);
      if (data) {
        const ids = [];
        (data.sections || []).forEach((s) =>
          s.items.forEach((it) =>
            (it.photos || []).forEach((p) => {
              if (!p.dataUrl) ids.push(p.id);
            })
          )
        );
        (data.workLog || []).forEach((w) =>
          (w.photos || []).forEach((p) => {
            if (!p.dataUrl) ids.push(p.id);
          })
        );
        for (const pid of ids) await delPhoto(pid);
      }
      await sDel("insp:" + e.id);
    }
    await sDel("idx:" + v.id);
    const vtasks = (await sGet("tasks:" + v.id)) || [];
    for (const t of vtasks)
      for (const ph of t.photos || []) await delPhoto(ph.id);
    await sDel("tasks:" + v.id);
    const next = vessels.filter((x) => x.id !== v.id);
    await saveVessels(next);
    setScreen("vessels");
  }

  async function openDossier() {
    const all = [];
    for (const e of index) {
      const d = await sGet("insp:" + e.id);
      if (d) {
        await hydratePhotos(d);
        all.push(d);
      }
    }
    all.sort((a, b) => new Date(a.dateISO) - new Date(b.dateISO));
    setDossier(all);
    setScreen("dossier");
  }

  function patchItem(sectionIdx, itemId, patch) {
    setInsp((prev) => ({
      ...prev,
      sections: prev.sections.map((s, i) => {
        if (i !== sectionIdx) return s;
        return {
          ...s,
          items: s.items.map((it) =>
            it.id === itemId
              ? { ...it, ...(typeof patch === "function" ? patch(it) : patch) }
              : it
          ),
        };
      }),
    }));
  }

  function addCustomItem(sectionIdx, name) {
    setInsp((prev) => ({
      ...prev,
      sections: prev.sections.map((s, i) => {
        if (i !== sectionIdx) return s;
        return {
          ...s,
          items: [
            ...s.items,
            { id: uid(), name, status: null, note: "", photos: [] },
          ],
        };
      }),
    }));
  }

  function removeItem(sectionIdx, itemId) {
    setInsp((prev) => ({
      ...prev,
      sections: prev.sections.map((s, i) =>
        i !== sectionIdx
          ? s
          : { ...s, items: s.items.filter((it) => it.id !== itemId) }
      ),
    }));
  }

  async function pullTaskToReport(task) {
    const newPhotos = [];
    for (const ph of task.photos || []) {
      const nid = await copyPhoto(ph.id);
      if (nid) newPhotos.push({ id: nid });
    }
    setInsp((prev) => ({
      ...prev,
      workLog: [
        ...(prev.workLog || []),
        {
          id: uid(),
          title: task.title || "Owner-requested item",
          detail: task.detail || "",
          parts: "",
          photos: newPhotos,
        },
      ],
    }));
    const next = tasks.map((t) =>
      t.id === task.id
        ? { ...t, status: "done", doneISO: new Date().toISOString() }
        : t
    );
    setTasks(next);
    await sSet("tasks:" + activeVessel.id, next);
    setToast("Added to this report's work log.");
  }

  if (loading) {
    return (
      <Shell>
        <div
          style={{
            padding: 60,
            textAlign: "center",
            color: C.mute,
          }}
        >
          Loading…
        </div>
      </Shell>
    );
  }

  return (
    <Shell>
      {screen === "vessels" && (
        <VesselsScreen
          vessels={vessels}
          saveVessels={saveVessels}
          openVessel={openVessel}
          openBackup={() => setScreen("backup")}
        />
      )}
      {screen === "backup" && (
        <BackupScreen
          back={() => setScreen("vessels")}
          setToast={setToast}
          reloadVessels={async () => {
            const v = await sGet("vessels");
            setVessels(v || []);
          }}
        />
      )}
      {screen === "vessel" && activeVessel && (
        <VesselScreen
          vessel={activeVessel}
          index={index}
          taskCount={tasks.filter((t) => t.status !== "done").length}
          openTasks={() => setScreen("tasks")}
          back={() => setScreen("vessels")}
          startInspection={startInspection}
          openInspection={openInspection}
          deleteInspection={deleteInspection}
          deleteVessel={deleteVessel}
          openDossier={openDossier}
        />
      )}
      {screen === "tasks" && activeVessel && (
        <TasksScreen
          vessel={activeVessel}
          tasks={tasks}
          setTasks={setTasks}
          back={() => setScreen("vessel")}
          setToast={setToast}
        />
      )}
      {screen === "inspect" && insp && (
        <InspectScreen
          vessel={activeVessel}
          insp={insp}
          openTasksList={tasks.filter((t) => t.status !== "done")}
          pullTask={pullTaskToReport}
          setInsp={setInsp}
          patchItem={patchItem}
          addCustomItem={addCustomItem}
          removeItem={removeItem}
          setToast={setToast}
          saveState={saveState}
          saveNow={saveNow}
          back={async () => {
            saveNow();
            const idx = await sGet("idx:" + activeVessel.id);
            setIndex(idx || indexRef.current);
            setScreen("vessel");
          }}
          viewReport={() => {
            saveNow();
            setScreen("report");
          }}
        />
      )}
      {screen === "report" && insp && (
        <ReportScreen
          vessel={activeVessel}
          insp={insp}
          back={() => setScreen("inspect")}
        />
      )}
      {screen === "dossier" && dossier && (
        <DossierScreen
          vessel={activeVessel}
          reports={dossier}
          back={() => setScreen("vessel")}
        />
      )}
      {toast && <Toast text={toast} />}
    </Shell>
  );
}

/* ============================ shell ============================ */
function Shell({ children }) {
  return (
    <div style={{ minHeight: "100vh", background: C.paper, color: C.ink }}>
      <div className="cmp-root">{children}</div>
    </div>
  );
}

function TopBar({ sub, onBack, right }) {
  return (
    <div
      className="no-print"
      style={{
        background: C.ink,
        color: "#fff",
        padding: "14px 18px",
        display: "flex",
        alignItems: "center",
        gap: 14,
        position: "sticky",
        top: 0,
        zIndex: 20,
        borderBottom: "3px solid " + C.brass,
      }}
    >
      {onBack && (
        <button
          onClick={onBack}
          aria-label="Back"
          style={{
            background: "transparent",
            border: "1px solid rgba(255,255,255,0.35)",
            color: "#fff",
            borderRadius: 6,
            padding: "6px 12px",
            fontSize: 13,
            fontWeight: 600,
          }}
        >
          ← Back
        </button>
      )}
      <div style={{ flex: 1, minWidth: 0 }}>
        <div
          style={{
            fontWeight: 900,
            fontSize: 15,
            letterSpacing: "0.06em",
            textTransform: "uppercase",
          }}
        >
          Coastal Marine <span style={{ color: C.brass }}>Pro</span>
        </div>
        {sub && (
          <div
            style={{
              fontSize: 11,
              opacity: 0.75,
              letterSpacing: "0.1em",
              textTransform: "uppercase",
            }}
          >
            {sub}
          </div>
        )}
      </div>
      {right}
    </div>
  );
}

function Toast({ text }) {
  return (
    <div
      style={{
        position: "fixed",
        bottom: 20,
        left: "50%",
        transform: "translateX(-50%)",
        background: C.ink,
        color: "#fff",
        padding: "10px 18px",
        borderRadius: 8,
        fontSize: 13,
        zIndex: 100,
        boxShadow: "0 6px 20px rgba(0,0,0,0.3)",
        maxWidth: "90vw",
      }}
    >

/* ====================== backup screen ====================== */
function BackupScreen({ back, setToast, reloadVessels }) {
  const [busy, setBusy] = useState(false);
  const fileRef = useRef(null);

  async function exportBackup() {
    setBusy(true);
    try {
      const keys = await sKeys();
      const data = {};
      for (const k of keys) data[k] = await sGet(k);
      const blob = new Blob(
        [
          JSON.stringify({
            app: "coastal-marine-pro",
            version: 1,
            exported: new Date().toISOString(),
            data,
          }),
        ],
        { type: "application/json" }
      );
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download =
        "coastal-marine-pro-backup-" +
        new Date().toISOString().slice(0, 10) +
        ".json";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setToast("Backup file created. Save it somewhere safe (Files, iCloud, Drive).");
    } catch (e) {
      setToast("Backup failed: " + String((e && e.message) || e));
    }
    setBusy(false);
  }

  async function importBackup(e) {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    if (
      !confirm(
        "Restoring a backup REPLACES everything currently in the app with the backup contents. Continue?"
      )
    )
      return;
    setBusy(true);
    try {
      const text = await file.text();
      const parsed = JSON.parse(text);
      if (!parsed || parsed.app !== "coastal-marine-pro" || !parsed.data)
        throw new Error("Not a Coastal Marine Pro backup file");
      const existing = await sKeys();
      for (const k of existing) await sDel(k);
      const entries = Object.entries(parsed.data);
      for (const [k, v] of entries) await sSet(k, v);
      await reloadVessels();
      setToast("Backup restored: " + entries.length + " records.");
    } catch (err) {
      setToast("Restore failed: " + String((err && err.message) || err));
    }
    setBusy(false);
  }

  async function wipeAll() {
    if (
      !confirm(
        "Delete ALL app data: vessels, reports, and photos. This cannot be undone. Continue?"
      )
    )
      return;
    setBusy(true);
    const keys = await sKeys();
    for (const k of keys) await sDel(k);
    await reloadVessels();
    setToast("All app data deleted.");
    setBusy(false);
  }

  return (
    <div>
      <TopBar sub="Backup & Data" onBack={back} />
      <div style={{ maxWidth: 760, margin: "0 auto", padding: 18 }}>
        {busy && (
          <div style={{ color: C.mute, fontSize: 13, marginBottom: 12 }}>
            Working…
          </div>
        )}
        <div
          style={{
            background: C.card,
            border: "1px solid " + C.line,
            borderRadius: 10,
            padding: 14,
            marginBottom: 16,
            fontSize: 13.5,
            lineHeight: 1.6,
            color: C.inkSoft,
          }}
        >
          Your reports and photos are stored in this phone's browser database.
          They survive closing the browser, but clearing browser data or losing
          the phone would erase them. Export a backup file after each service
          day and keep it in iCloud or Drive.
        </div>
        <PrimaryBtn onClick={exportBackup} style={{ width: "100%", marginBottom: 10 }}>
          Export full backup
        </PrimaryBtn>
        <button
          onClick={() => fileRef.current && fileRef.current.click()}
          style={{
            width: "100%",
            padding: "13px",
            background: "transparent",
            border: "2px solid " + C.ink,
            borderRadius: 8,
            color: C.ink,
            fontWeight: 800,
            fontSize: 13,
            letterSpacing: "0.04em",
            textTransform: "uppercase",
            marginBottom: 24,
          }}
        >
          Restore from backup file
        </button>
        <input
          ref={fileRef}
          type="file"
          accept="application/json"
          onChange={importBackup}
          style={{ display: "none" }}
        />
        <button
          onClick={wipeAll}
          style={{
            width: "100%",
            padding: "12px",
            background: "transparent",
            border: "1.5px solid " + C.action,
            borderRadius: 8,
            color: C.action,
            fontWeight: 800,
            fontSize: 12,
            letterSpacing: "0.06em",
            textTransform: "uppercase",
          }}
        >
          Delete all app data
        </button>
      </div>
    </div>
  );
}

/* shared photo add flow: persist each photo the moment it's taken */
async function addPhotosFromInput(e, onPatch, setToast) {
  const files = Array.from(e.target.files || []);
  e.target.value = "";
  for (const f of files) {
    try {
      const dataUrl = await compressImage(f);
      const id = uid();
      const ok = await savePhoto(id, dataUrl);
      if (!ok) {
        setToast("Photo save failed: " + (lastError || "unknown error"));
        continue;
      }
      onPatch((prev) => ({ photos: [...(prev.photos || []), { id }] }));
    } catch (err) {
      setToast("Couldn't process that photo.");
    }
  }
}

function WorkLog({ insp, setInsp, setToast, title }) {

      ...prev,
      workLog: [
        ...(prev.workLog || []),
        { id: uid(), title: "", detail: "", parts: "", photos: [] },

    }));

  function patchEntry(id, patch) {
    setInsp((prev) => ({
      ...prev,
      workLog: (prev.workLog || []).map((e) =>
        e.id === id
          ? { ...e, ...(typeof patch === "function" ? patch(e) : patch) }

/* ====================== work list screen ====================== */
function TasksScreen({ vessel, tasks, setTasks, back, setToast }) {
  const open = tasks.filter((t) => t.status !== "done");
  const done = tasks.filter((t) => t.status === "done");
  const [showDone, setShowDone] = useState(false);

  function addTask() {
    setTasks([
      {
        id: uid(),
        title: "",
        detail: "",
        photos: [],
        createdISO: new Date().toISOString(),
        status: "open",
      },
      ...tasks,
    ]);
  }
  function patchTask(id, patch) {
    setTasks(
      tasks.map((t) =>
        t.id === id
          ? { ...t, ...(typeof patch === "function" ? patch(t) : patch) }
          : t
      )
    );
  }
  function completeTask(id) {
    setTasks(
      tasks.map((t) =>
        t.id === id
          ? { ...t, status: "done", doneISO: new Date().toISOString() }
          : t
      )
    );
  }
  function reopenTask(id) {
    setTasks(
      tasks.map((t) =>
        t.id === id ? { ...t, status: "open", doneISO: null } : t
      )
    );
  }
  function deleteTask(t) {
    if (!confirm("Delete this work list item permanently?")) return;
    (t.photos || []).forEach((ph) => delPhoto(ph.id));
    setTasks(tasks.filter((x) => x.id !== t.id));
  }

  return (
    <div>
      <TopBar sub={vessel.name + " - Work List"} onBack={back} />
      <div style={{ maxWidth: 760, margin: "0 auto", padding: 18 }}>
        <div
          style={{
            fontSize: 13.5,
            lineHeight: 1.6,
            color: C.inkSoft,
            marginBottom: 14,
          }}
        >
          Owner requests and items to handle on a future visit. Log them the
          moment the text comes in. Open items appear automatically when you
          start a report on this vessel, with a one-tap button to log them as
          work performed.
        </div>
        <PrimaryBtn onClick={addTask} style={{ width: "100%", marginBottom: 16 }}>
          + Add work list item
        </PrimaryBtn>
        {open.length === 0 && (
          <div style={{ color: C.mute, fontSize: 14, marginBottom: 16 }}>
            No open items.
          </div>
        )}
        {open.map((t) => (
          <TaskCard
            key={t.id}
            task={t}
            onPatch={(p) => patchTask(t.id, p)}
            onComplete={() => completeTask(t.id)}
            onDelete={() => deleteTask(t)}
            setToast={setToast}
          />
        ))}
        {done.length > 0 && (
          <button
            onClick={() => setShowDone(!showDone)}
            style={{ ...smallBtn(), width: "100%", marginTop: 8, padding: "10px" }}
          >
            {showDone ? "Hide" : "Show"} completed ({done.length})
          </button>
        )}
        {showDone &&
          done.map((t) => (
            <div
              key={t.id}
              style={{
                background: C.card,
                border: "1px solid " + C.line,
                borderLeft: "5px solid " + C.good,
                borderRadius: 10,
                padding: "10px 14px",
                marginTop: 10,
              }}
            >
              <div
                style={{
                  display: "flex",
                  alignItems: "center",
                  gap: 10,
                  flexWrap: "wrap",
                }}
              >
                <div style={{ flex: 1, minWidth: 140 }}>
                  <div
                    style={{
                      fontWeight: 700,
                      fontSize: 13,
                      textDecoration: "line-through",
                      color: C.mute,
                    }}
                  >
                    {t.title || "Untitled item"}
                  </div>
                  <div style={{ fontSize: 11, color: C.mute }}>
                    Completed {t.doneISO ? dateLabel(t.doneISO) : ""}
                  </div>
                </div>
                <button onClick={() => reopenTask(t.id)} style={smallBtn()}>
                  Reopen
                </button>
                <button
                  onClick={() => deleteTask(t)}
                  style={{ ...smallBtn(), color: C.action, borderColor: C.action }}
                >
                  ✕
                </button>
              </div>
            </div>
          ))}
        <div style={{ height: 40 }} />
      </div>
    </div>
  );
}

function TaskCard({ task, onPatch, onComplete, onDelete, setToast }) {
  const fileRef = useRef(null);
  return (
    <div
      style={{
        background: C.card,
        border: "1px solid " + C.line,
        borderLeft: "5px solid " + C.monitor,
        borderRadius: 10,
        padding: 12,
        marginBottom: 12,
      }}
    >
      <div style={{ fontSize: 11, color: C.mute, marginBottom: 6 }}>
        Added {dateLabel(task.createdISO)}
      </div>
      <div style={{ display: "flex", gap: 8 }}>
        <input
          value={task.title}
          onChange={(e) => onPatch({ title: e.target.value })}
          placeholder="What to check or fix, e.g. Owner reports livewell pump weak"
          style={{ ...inputStyle(), flex: 1, fontWeight: 700 }}
        />
        <button
          onClick={onDelete}
          aria-label="Delete item"
          style={{ ...smallBtn(), color: C.action, borderColor: C.action }}
        >
          ✕
        </button>
      </div>
      <textarea
        value={task.detail}
        onChange={(e) => onPatch({ detail: e.target.value })}
        placeholder="Details from the owner, parts to bring, where it is on the boat."
        rows={2}
        style={{ ...inputStyle(), resize: "vertical", fontSize: 13, marginTop: 8 }}
      />
      <PhotoStrip
        photos={task.photos || []}
        onRemove={(pid) => {
          onPatch((prev) => ({
            photos: (prev.photos || []).filter((x) => x.id !== pid),
          }));
          delPhoto(pid);
        }}
        onAddClick={() => fileRef.current && fileRef.current.click()}
        fileRef={fileRef}
        onFiles={(e) => addPhotosFromInput(e, onPatch, setToast)}
        addLabel={"+ Photo"}
      />
      <button
        onClick={onComplete}
        style={{
          marginTop: 10,
          width: "100%",
          padding: "10px",
          background: C.good,
          border: "none",
          borderRadius: 8,
          color: "#fff",
          fontWeight: 800,
          fontSize: 12,
          letterSpacing: "0.04em",
          textTransform: "uppercase",
        }}
      >
        Mark complete (without logging)
      </button>
    </div>
  );
}
